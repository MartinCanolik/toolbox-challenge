version: "3.9"

services:
  api:
    build:
      context: ./api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - API_KEY=${API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:3001
    ports:
      - "8080:8080"
    depends_on:
      - api
    restart: unless-stopped
